name: Daily Shopify Report

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  daily-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: echo '${{ secrets.CONFIG_JSON }}' > config.json
      - run: python reporter.py daily
      - run: python reporter.py combined
      - uses: actions/upload-artifact@v4
        with:
          name: reports-${{ github.run_number }}
          path: reports/
          retention-days: 30
